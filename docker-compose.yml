services:
  api:
    build: .
    ports: ["${PORT:-8001}:${PORT:-8001}"]
    env_file: .env
    depends_on: [db]
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: pbg
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: pbg
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
volumes:
  pgdata: